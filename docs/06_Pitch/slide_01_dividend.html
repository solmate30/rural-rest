<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rural Rest — Masterchef Dividend</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  .slide {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 80px;
    width: 100%;
  }

  .tag  { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #8b949e; margin-bottom: 16px; }
  h2   { font-size: 42px; font-weight: 700; line-height: 1.1; letter-spacing: -1px; color: #f0f6fc; }

  .blue   { color: #60a5fa; }
  .purple { color: #a78bfa; }
  .pink   { color: #f472b6; }

  .pill { display: inline-block; padding: 4px 12px; border-radius: 999px; font-size: 11px; letter-spacing: 0.06em; font-weight: 600; }
  .pill-green  { border: 1px solid #17cf54; color: #17cf54; }
  .pill-blue   { border: 1px solid #60a5fa; color: #60a5fa; }
  .pill-purple { border: 1px solid #a78bfa; color: #a78bfa; }

  .formula-wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 28px; }
  .formula-row  { display: flex; align-items: center; gap: 20px; }
  .term { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .term-value { font-size: 40px; font-weight: 700; }
  .term-label { font-size: 11px; color: #8b949e; letter-spacing: 0.04em; }
  .op { font-size: 32px; color: #8b949e; font-weight: 300; padding-top: 4px; }
  .result-value { font-size: 72px; font-weight: 800; color: #17cf54; letter-spacing: -2px; }
  .result-label { font-size: 13px; color: #8b949e; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .anim-1 { opacity: 0; animation: fadeUp 0.5s ease forwards; animation-delay: 10.3s; }
  .anim-2 { opacity: 0; animation: fadeUp 0.5s ease forwards; animation-delay: 10.9s; }
  .anim-3 { opacity: 0; animation: fadeUp 0.6s ease forwards; animation-delay: 11.5s; }
  .anim-4 { opacity: 0; animation: fadeUp 0.5s ease forwards; animation-delay: 12.2s; }
</style>
</head>
<body>

<div class="slide">
  <p class="tag anim-1">Technical Challenge · Masterchef Dividend Pattern</p>
  <h2 class="anim-1">No Double-Claim, By Design</h2>

  <div class="formula-wrap">
    <div class="formula-row anim-2">
      <div class="term">
        <span class="term-value blue">1,000,000</span>
        <span class="term-label">tokens held</span>
      </div>
      <span class="op">×</span>
      <div class="term">
        <span class="term-value purple">0.004200</span>
        <span class="term-label">acc_dividend_per_share</span>
      </div>
      <span class="op">−</span>
      <div class="term">
        <span class="term-value pink">3,000</span>
        <span class="term-label">reward_debt</span>
      </div>
    </div>

    <div class="anim-3" style="font-size:28px; color:#30363d;">↓</div>

    <div class="anim-3" style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <span class="result-value">1,200 USDC</span>
      <span class="result-label">claimable dividend</span>
    </div>
  </div>

  <div class="anim-4" style="display:flex; gap:12px; margin-top:28px; flex-wrap:wrap; justify-content:center;">
    <span class="pill pill-green">No double-claim</span>
    <span class="pill pill-purple">No retroactive gain</span>
    <span class="pill pill-blue">O(1) efficiency</span>
  </div>
</div>

</body>
</html>
